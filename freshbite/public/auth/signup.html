<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account | FreshBite</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{--forest:#1c3a2a;--leaf:#2d6a4f;--lime:#74c69d;--mint:#b7e4c7;--cream:#f8f4ef;--cream-2:#f0ebe3;--charcoal:#1a1a1a;--muted:#6b7280;--white:#ffffff;--bg:var(--cream);--bg-2:var(--cream-2);--text:var(--charcoal);--text-sub:var(--muted);--border:rgba(28,58,42,0.12);--card-bg:var(--white);--font-display:'Cormorant Garamond',serif;--font-body:'DM Sans',sans-serif;--r-md:16px;--r-lg:24px;--r-xl:40px;--transition:0.3s cubic-bezier(0.4,0,0.2,1)}
    [data-theme="dark"]{--bg:#0d1f16;--bg-2:#111e18;--text:#e8f5ed;--text-sub:#8dab97;--border:rgba(116,198,157,0.15);--card-bg:#162318}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;display:flex;transition:background var(--transition),color var(--transition)}
    a{color:inherit;text-decoration:none}
    .auth-page{flex:1;display:grid;grid-template-columns:1fr 1fr;min-height:100vh}
    @media(max-width:768px){.auth-page{grid-template-columns:1fr}}
    .auth-visual{background:linear-gradient(160deg,#0a1f14,#1c3a2a);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:48px}
    @media(max-width:768px){.auth-visual{display:none}}
    .auth-visual-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 80% at 50% 50%,rgba(116,198,157,0.1),transparent)}
    .auth-visual-content{position:relative;z-index:1;text-align:center}
    .auth-visual-logo{font-family:var(--font-display);font-size:2rem;color:white;margin-bottom:8px;display:flex;align-items:center;gap:10px;justify-content:center}
    .logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--leaf),var(--lime));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
    .auth-visual-tagline{color:rgba(255,255,255,0.5);font-size:0.9rem;margin-bottom:48px}
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .stat-box{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:20px;text-align:center}
    .stat-num{font-family:var(--font-display);font-size:2.5rem;color:var(--lime)}
    .stat-label{font-size:0.75rem;color:rgba(255,255,255,0.45);margin-top:4px}
    .auth-form-side{display:flex;align-items:center;justify-content:center;padding:32px 24px}
    .auth-form-wrap{width:100%;max-width:440px}
    .auth-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:40px}
    .auth-logo{display:flex;align-items:center;gap:8px;font-family:var(--font-display);font-size:1.3rem;font-weight:600;color:var(--forest)}
    [data-theme="dark"] .auth-logo{color:var(--lime)}
    .auth-logo-icon{width:28px;height:28px;background:linear-gradient(135deg,var(--leaf),var(--lime));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px}
    .theme-toggle{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;transition:all var(--transition)}
    .form-title{font-family:var(--font-display);font-size:3rem;font-weight:300;margin-bottom:6px}
    .form-sub{color:var(--text-sub);font-size:0.9rem;margin-bottom:28px}
    .form-sub a{color:var(--leaf);font-weight:500}
    .form-group{margin-bottom:16px}
    .form-label{font-size:0.8rem;font-weight:600;margin-bottom:6px;display:block;color:var(--text-sub)}
    .form-input{width:100%;padding:12px 16px;background:var(--bg-2);border:1.5px solid var(--border);border-radius:var(--r-md);font-family:var(--font-body);font-size:0.9rem;color:var(--text);outline:none;transition:all var(--transition)}
    .form-input:focus{border-color:var(--lime);background:var(--card-bg)}
    .form-input::placeholder{color:var(--text-sub)}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .form-error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:var(--r-md);padding:10px 14px;font-size:0.82rem;color:#dc2626;margin-bottom:14px;display:none}
    .form-error.show{display:block}
    .form-success{background:rgba(116,198,157,0.1);border:1px solid rgba(116,198,157,0.3);border-radius:var(--r-md);padding:12px 14px;font-size:0.85rem;color:var(--leaf);margin-bottom:14px;display:none;line-height:1.5}
    .form-success.show{display:block}
    .password-strength{height:4px;border-radius:2px;background:var(--bg-2);margin-top:6px;overflow:hidden}
    .strength-fill{height:100%;border-radius:2px;transition:all 0.3s ease;width:0}
    .strength-label{font-size:0.72rem;color:var(--text-sub);margin-top:4px}
    .submit-btn{width:100%;padding:14px;border-radius:var(--r-xl);background:var(--forest);color:white;font-family:var(--font-body);font-size:0.9rem;font-weight:600;border:none;cursor:pointer;transition:all var(--transition);margin-bottom:12px}
    .submit-btn:hover{background:var(--leaf)}
    .submit-btn:disabled{opacity:0.6;cursor:not-allowed}
    .terms-note{font-size:0.75rem;color:var(--text-sub);text-align:center;margin-bottom:16px}
    .terms-note a{color:var(--leaf)}
    .divider{display:flex;align-items:center;gap:12px;margin:16px 0;font-size:0.75rem;color:var(--text-sub)}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
    .social-btns{display:flex;gap:10px}
    .social-btn{flex:1;padding:11px;border-radius:var(--r-md);border:1.5px solid var(--border);background:transparent;color:var(--text);font-family:var(--font-body);font-size:0.85rem;cursor:pointer;transition:all var(--transition);display:flex;align-items:center;justify-content:center;gap:8px}
    .social-btn:hover{border-color:var(--lime)}
  </style>
</head>
<body>
  <div class="auth-page">
    <!-- LEFT VISUAL -->
    <div class="auth-visual">
      <div class="auth-visual-bg"></div>
      <div class="auth-visual-content">
        <div class="auth-visual-logo"><div class="logo-icon">🌿</div>FreshBite</div>
        <p class="auth-visual-tagline">Join thousands of healthy eaters today.</p>
        <div class="stats-grid">
          <div class="stat-box"><div class="stat-num">500+</div><div class="stat-label">Healthy Recipes</div></div>
          <div class="stat-box"><div class="stat-num">50k+</div><div class="stat-label">Members</div></div>
          <div class="stat-box"><div class="stat-num">100%</div><div class="stat-label">Free Forever</div></div>
          <div class="stat-box"><div class="stat-num">4.9★</div><div class="stat-label">App Rating</div></div>
        </div>
      </div>
    </div>

    <!-- RIGHT FORM -->
    <div class="auth-form-side">
      <div class="auth-form-wrap">
        <div class="auth-nav">
          <a href="/" class="auth-logo"><div class="auth-logo-icon">🌿</div>FreshBite</a>
          <button class="theme-toggle" id="themeToggle">🌙</button>
        </div>

        <h1 class="form-title">Join FreshBite</h1>
        <p class="form-sub">Already have an account? <a href="/auth/login.html">Sign in</a></p>

        <div class="form-error" id="formError"></div>
        <div class="form-success" id="formSuccess"></div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">First Name</label>
            <input type="text" class="form-input" id="firstNameInput" placeholder="Jane" />
          </div>
          <div class="form-group">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-input" id="lastNameInput" placeholder="Smith" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="emailInput" placeholder="jane@email.com" />
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="passwordInput" placeholder="Min. 8 characters" oninput="checkStrength(this.value)" />
          <div class="password-strength"><div class="strength-fill" id="strengthFill"></div></div>
          <div class="strength-label" id="strengthLabel">Enter at least 8 characters</div>
        </div>

        <div class="form-group">
          <label class="form-label">Dietary Preference (optional)</label>
          <select class="form-input" id="dietInput">
            <option value="">No preference</option>
            <option value="vegan">Vegan 🌱</option>
            <option value="vegetarian">Vegetarian 🥦</option>
            <option value="gluten-free">Gluten-Free 🌾</option>
            <option value="keto">Keto 🥑</option>
            <option value="paleo">Paleo 🥩</option>
          </select>
        </div>

        <button class="submit-btn" id="signupBtn" onclick="handleSignup()">🌿 Create Free Account</button>

        <p class="terms-note">By signing up you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.</p>

        <div class="divider">or sign up with</div>
        <div class="social-btns">
          <button class="social-btn" onclick="googleSignup()">🔍 Google</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ─── PASTE YOUR SUPABASE KEYS HERE ───────────────────────────
    const SUPABASE_URL = 'https://gfhsexkpzqlfwactwtbp.supabase.co'
    const SUPABASE_ANON_KEY = 'sb_publishable_og6Zn6OGyV76L7D0Fs0pDg_Wbm-OkeE'
    // ─────────────────────────────────────────────────────────────

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    function checkStrength(pw) {
      const fill = document.getElementById('strengthFill')
      const label = document.getElementById('strengthLabel')
      let score = 0
      if (pw.length >= 8) score++
      if (/[A-Z]/.test(pw)) score++
      if (/[0-9]/.test(pw)) score++
      if (/[^A-Za-z0-9]/.test(pw)) score++
      const configs = [
        {w:'0%', color:'', text:'Enter at least 8 characters'},
        {w:'25%', color:'#ef4444', text:'Weak'},
        {w:'50%', color:'#f59e0b', text:'Fair'},
        {w:'75%', color:'#3b82f6', text:'Good'},
        {w:'100%', color:'var(--lime)', text:'Strong 💪'},
      ]
      const c = configs[score]
      fill.style.width = c.w
      fill.style.background = c.color
      label.textContent = c.text
      label.style.color = c.color || 'var(--text-sub)'
    }

    async function handleSignup() {
      const firstName = document.getElementById('firstNameInput').value.trim()
      const lastName = document.getElementById('lastNameInput').value.trim()
      const email = document.getElementById('emailInput').value.trim()
      const password = document.getElementById('passwordInput').value
      const diet = document.getElementById('dietInput').value
      const errorEl = document.getElementById('formError')
      const successEl = document.getElementById('formSuccess')
      const btn = document.getElementById('signupBtn')

      errorEl.classList.remove('show')
      successEl.classList.remove('show')

      // Validate
      if (!firstName) {
        errorEl.textContent = 'Please enter your first name.'
        errorEl.classList.add('show')
        return
      }
      if (!email || !email.includes('@')) {
        errorEl.textContent = 'Please enter a valid email address.'
        errorEl.classList.add('show')
        return
      }
      if (password.length < 8) {
        errorEl.textContent = 'Password must be at least 8 characters.'
        errorEl.classList.add('show')
        return
      }

      btn.textContent = 'Creating account…'
      btn.disabled = true

      const fullName = firstName + (lastName ? ' ' + lastName : '')

      const { data, error } = await supabase.auth.signUp({
        email,
        password,
        options: {
          data: {
            name: fullName,
            diet: diet
          }
        }
      })

      if (error) {
        errorEl.textContent = error.message
        errorEl.classList.add('show')
        btn.textContent = '🌿 Create Free Account'
        btn.disabled = false
        return
      }

      // Show success — ask them to confirm email
      successEl.innerHTML = `
        ✅ <strong>Account created!</strong><br>
        We sent a confirmation email to <strong>${email}</strong>.<br>
        Please check your inbox and click the link to activate your account.
      `
      successEl.classList.add('show')
      btn.textContent = '✅ Check your email!'
      btn.disabled = true
    }

    async function googleSignup() {
      await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin }
      })
    }

    // Dark mode
    const html = document.documentElement
    const saved = localStorage.getItem('fb_theme') || 'light'
    html.setAttribute('data-theme', saved)
    const tt = document.getElementById('themeToggle')
    tt.textContent = saved === 'dark' ? '☀️' : '🌙'
    tt.addEventListener('click', () => {
      const n = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'
      html.setAttribute('data-theme', n)
      tt.textContent = n === 'dark' ? '☀️' : '🌙'
      localStorage.setItem('fb_theme', n)
    })

    // Redirect if already logged in
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location = '/'
    })
  </script>
</body>
</html>
